<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Interface de login do Trello</title>

    <!--
      <script src="https://unpkg.com/@codans/trello"></script>
    -->

</head>
<body>
  <div class="LoginForm" alt="Trello-logo"">
  
  <img src="img/trello.svg" width="200">
  <h1>Fazer login no trello</h1>
  
  <form action="" method="GET">
    <input type="text" name="email" placeholder="Insira seu e-mail"><br>
    <input type="password" name="senha" placeholder="Insira sua senha"><br>
    <input type="submit" value="fazer login"><br><br>
  </form>
<!-- action: É o destino. Define para qual URL ou arquivo os dados do formulário devem ser enviados quando o usuário clica no botão de "Enviar". Se estiver vazio (como no seu exemplo), ele envia os dados para a própria página onde o formulário está.
method: É o transporte. Define como os dados serão enviados. Os dois tipos mais comuns são:
    GET: Os dados vão "pendurados" na URL (ex: site.com?email=teste@email.com). É pouco seguro para senhas, mas ótimo para buscas.
    POST: Os dados vão escondidos no "corpo" da requisição. É o padrão para login, cadastro e envio de arquivos. -->
  <span>ou</span><br><br>

  <button>
    <img src="img/google.svg" width="30" alt="Google">
    Continuar com Google
  </button><br>
  
  <button>
    <img src="img/microsoft.svg" width="30" alt="Google">
    Continuar com Microsoft
  </button><br>

  <button>
    <img src="img/apple.svg" width="30" alt="Google">
    Continuar com Apple
  </button><br>

  <button>
    <img src="img/slack.svg" width="30" alt="Google">
    Continuar com Slack
  </button><br><br>

  <img src="img/atlassian.svg" width="200" alt="Atlassian">
  <img src="img/analytics.svg" width="200" alt="analytics">
  <img src="img/interactive.svg" width="200" alt="interactive">
</div>
</body>
</html>
